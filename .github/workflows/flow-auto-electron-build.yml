name: Build FlowAuto Electron Modern UI

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/flow_auto_electron/**'
      - '.github/workflows/flow-auto-electron-build.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults: { run: { working-directory: apps/flow_auto_electron } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm install
      - run: |
          python -m pip install -U pip
          python -m pip install -r payload/requirements.txt
          if (Test-Path payload\python) { Remove-Item -Recurse -Force payload\python }
          New-Item -ItemType Directory -Force -Path payload\python | Out-Null
          Copy-Item -Recurse -Force $env:pythonLocation payload\python\runtime
        shell: pwsh
      - run: npm run dist
      - run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Copy-Item -Force release\FlowAutoElectron-Windows.exe out\FlowAutoElectron-Windows.exe
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: FlowAutoElectron-Windows-single-file
          path: apps/flow_auto_electron/out/FlowAutoElectron-Windows.exe

  build-macos:
    if: false
    runs-on: macos-latest
    defaults: { run: { working-directory: apps/flow_auto_electron } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm install
      - run: |
          python -m pip install -U pip
          python -m pip install -r payload/requirements.txt
          rm -rf payload/python
          mkdir -p payload/python
          cp -aL "$pythonLocation" payload/python/runtime
      - run: npm run dist
      - run: |
          mkdir -p out
          cp -f release/FlowAutoElectron-macOS.dmg out/FlowAutoElectron-macOS.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: FlowAutoElectron-macOS-single-file
          path: apps/flow_auto_electron/out/FlowAutoElectron-macOS.dmg

  build-linux:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/flow_auto_electron } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: npm install
      - run: |
          python -m pip install -U pip
          python -m pip install -r payload/requirements.txt
          rm -rf payload/python
          mkdir -p payload/python
          cp -aL "$pythonLocation" payload/python/runtime
      - run: npm run dist
      - run: |
          mkdir -p out
          cp -f release/FlowAutoElectron-Linux.AppImage out/FlowAutoElectron-Linux.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: FlowAutoElectron-Linux-single-file
          path: apps/flow_auto_electron/out/FlowAutoElectron-Linux.AppImage

